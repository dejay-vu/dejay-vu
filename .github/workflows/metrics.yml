name: metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # GitHub account stats + full-year isocalendar + lines of code;
      # languages intentionally omitted (junhao-smi already covers language time)
      - name: Render terminal dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dejay-vu
          template: terminal
          filename: metrics.terminal.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_lines: yes
