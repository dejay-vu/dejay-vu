name: metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # terminal template only supports a subset of plugins (isocalendar, languages, ...)
      - name: Render terminal dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dejay-vu
          template: terminal
          filename: metrics.terminal.svg
          base: header, metadata
          config_timezone: Europe/London
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      # habits/achievements/stars are not supported by the terminal template
      - name: Render extras dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dejay-vu
          template: classic
          filename: metrics.extras.svg
          base: ""
          config_timezone: Europe/London
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_stars: yes
          plugin_stars_limit: 4
